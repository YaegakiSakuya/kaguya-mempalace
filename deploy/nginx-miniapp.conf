# ===== Kaguya Mini App =====

# 静态文件服务（前端 build 产物）
location /miniapp/ {
    alias /home/ubuntu/apps/kaguya-mempalace/miniapp/dist/;
    try_files $uri $uri/ /miniapp/index.html;
}

# Inspector API 反代（含 miniapp 路由）
location /miniapp/stream {
    proxy_pass http://127.0.0.1:8765/miniapp/stream;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    # SSE 专用：禁用所有缓冲
    proxy_read_timeout 86400s;
}

location /miniapp/history {
    proxy_pass http://127.0.0.1:8765/miniapp/history;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
}

location /miniapp/palace/ {
    proxy_pass http://127.0.0.1:8765/miniapp/palace/;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
}
