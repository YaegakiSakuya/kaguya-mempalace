<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Kaguya Mempalace — Wings</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/shell.css" />
<style>
  .wings-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; }
  .wing-list { display: flex; flex-direction: column; gap: 2px; }
  .wl-item {
    display: grid; grid-template-columns: 1fr auto; align-items: baseline;
    padding: 10px 14px; cursor: pointer;
    border: 1px solid transparent; border-radius: 2px;
    text-decoration: none; color: inherit;
    transition: border-color 320ms var(--ease), background 320ms var(--ease);
  }
  .wl-item:hover { background: var(--hover); }
  .wl-item.active { background: var(--hover); border-color: var(--border-strong); }
  .wl-item.active::before { content:""; position:absolute; }
  .wl-name { font-size: 13.5px; color: var(--text); letter-spacing: 0.02em; }
  .wl-name.sparse { color: var(--text-2); opacity: 0.72; }
  .wl-meta { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; }
  .wl-sub { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px; grid-column: 1 / -1; }
  .wl-sep { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; color: var(--text-3); text-transform: uppercase; padding: 14px 14px 6px; }
  .wl-sep + .wl-sep { border-top: 1px solid var(--border); }

  .wing-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 20px; border-bottom: 1px solid var(--border); gap: 32px;
  }
  .wh-name { font-size: 28px; font-weight: 400; letter-spacing: 0.02em; margin: 0; }
  .wh-jp { font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: var(--text-3); text-transform: uppercase; margin-top: 8px; }
  .wh-desc { font-size: 13px; color: var(--text-2); line-height: 1.8; margin-top: 14px; max-width: 560px; }
  .wh-stats { display: flex; gap: 28px; }
  .wh-stat { text-align: right; }
  .wh-stat .n { font-family: var(--mono); font-size: 22px; color: var(--text); letter-spacing: 0.02em; }
  .wh-stat .k { font-family: var(--mono); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.22em; text-transform: uppercase; margin-top: 4px; display: block; }

  .room-row { display: grid; grid-template-columns: 240px 1fr; gap: 24px; padding: 22px 0; border-bottom: 1px solid var(--border); }
  .room-row:last-child { border-bottom: none; }
  .room-name { font-size: 16px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  .room-jp { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }
  .room-stats { margin-top: 14px; font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; line-height: 1.8; }
  .room-stats .n { color: var(--text-2); }

  .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .d-tile { display: block; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border); border-radius: 2px;
    padding: 14px 16px;
    transition: border-color 320ms var(--ease), transform 120ms var(--ease), background 320ms var(--ease), opacity 160ms var(--ease);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
  }
  .d-tile:hover { border-color: var(--border-strong); background: rgba(184,77,90,0.025); }
  .d-tile:active { transform: translateY(0.5px) scale(0.995); }
  .d-tile[draggable="true"] { cursor: grab; }
  .d-tile[draggable="true"]:active { cursor: grabbing; }
  .d-tile.dragging { opacity: 0.4; }
  .d-title { font-size: 13.5px; color: var(--text); line-height: 1.5; margin: 0 0 6px; }
  .d-excerpt { font-size: 11.5px; color: var(--text-2); line-height: 1.7; margin: 0 0 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .d-foot { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.1em; }
  .d-foot .hot { color: var(--camellia-text); }

  .wl-item.drop-target {
    background: rgba(184,77,90,0.08);
    border-color: var(--camellia);
  }
  .room-row.drop-target {
    background: rgba(184,77,90,0.04);
    box-shadow: inset 0 0 0 1px var(--camellia);
    border-radius: 2px;
  }
</style>
</head>
<body data-page="wings" data-crumbs="Palace / Wings">
<div class="app">
  <div id="app-shell"></div>
  <div id="main-content">
    <div class="content">
      <header class="page-head">
        <div>
          <div class="eyebrow">Wings · 翼</div>
          <h1 class="page-title">全部翼，<span class="em">13 个内容翼 + 1 个归档。</span></h1>
          <p class="page-sub">按 drawer 数从密到疏排列。稀疏翼单独成组，归档翼 <em>chats</em> 不参与常规统计。</p>
        </div>
        <div class="page-head-right">
          <div class="big">13 <span style="font-size:13px;color:var(--text-3)">/ 14</span></div>
          <div>CONTENT · SYS</div>
          <div class="accent">▲ +1 wing this month</div>
        </div>
      </header>

      <div class="wings-layout">
        <aside></aside>
        <section></section>
      </div>
    </div>
  </div>
</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/api.js"></script>
<script src="assets/modal.js"></script>
<script>
(function () {
  'use strict';

  const esc = window.KaguyaAPI.escapeHtml;
  const fmtRel = window.KaguyaAPI.formatRelativeTime;
  const truncate = window.KaguyaAPI.truncate;

  // ---------- wing id mapping ----------
  function apiWingIdToDataId(apiKey) {
    if (apiKey === 'chats') return 'chats';
    const stripped = String(apiKey || '').replace(/^wing_/, '');
    if (stripped === 'sex_and_body') return 'sex_body';
    if (stripped === 'serious_reality') return 'reality';
    return stripped;
  }

  function dataIdToApiWingKey(dataId) {
    if (dataId === 'chats') return 'chats';
    if (dataId === 'sex_body') return 'wing_sex_and_body';
    if (dataId === 'reality') return 'wing_serious_reality';
    return 'wing_' + dataId;
  }

  // ---------- state ----------
  let wingsData = null;
  let taxonomyData = null;
  let currentWingKey = null;
  let loadToken = 0;
  const drawerCache = new Map();

  // ---------- payload normalization (mirrors index.html) ----------
  function normalizeWingsMap(raw) {
    const w = raw && raw.wings != null ? raw.wings : raw;
    if (!w) return {};
    if (Array.isArray(w)) {
      const out = {};
      w.forEach((n) => { if (typeof n === 'string') out[n] = 0; });
      return out;
    }
    if (typeof w === 'object') {
      const out = {};
      Object.keys(w).forEach((k) => {
        const v = w[k];
        out[k] = typeof v === 'number' ? v : 0;
      });
      return out;
    }
    return {};
  }

  function normalizeRoomsFor(wingBody) {
    if (!wingBody) return [];
    if (Array.isArray(wingBody)) {
      return wingBody
        .filter((x) => typeof x === 'string' && x)
        .map((name) => ({ name, count: 0 }));
    }
    if (typeof wingBody === 'object') {
      return Object.keys(wingBody).map((name) => {
        const v = wingBody[name];
        return { name, count: typeof v === 'number' ? v : 0 };
      });
    }
    return [];
  }

  // ---------- data.js metadata lookup ----------
  function lookupWingConfig(dataId) {
    const wings = (window.KAGUYA && window.KAGUYA.wings) || [];
    return wings.find((w) => w.id === dataId) || null;
  }

  function wingsMap() {
    return normalizeWingsMap(wingsData);
  }

  function taxonomyMap() {
    return (taxonomyData && taxonomyData.taxonomy) || {};
  }

  // ---------- sidebar render ----------
  function renderSidebar() {
    const aside = document.querySelector('.wings-layout > aside');
    if (!aside) return;

    const map = wingsMap();
    const tax = taxonomyMap();

    // γ: iterate data.js wings as source of truth for architecture
    const allWings = (window.KAGUYA && window.KAGUYA.wings) || [];
    const entries = allWings.map((wingCfg) => {
      const apiKey = dataIdToApiWingKey(wingCfg.id);
      const drawerCount = Number(map[apiKey] || 0);
      const rooms = normalizeRoomsFor(tax[apiKey]);
      return {
        apiKey,
        dataId: wingCfg.id,
        drawerCount,
        displayName: wingCfg.name || wingCfg.id,
        code: wingCfg.code || '',
        rooms,
        roomCount: rooms.length,
        isArchive: !!wingCfg.archive,
      };
    });

    const content = entries
      .filter((e) => !e.isArchive && e.drawerCount >= 2)
      .sort((a, b) => b.drawerCount - a.drawerCount);
    const sparse = entries
      .filter((e) => !e.isArchive && e.drawerCount === 1);
    const dormant = entries
      .filter((e) => !e.isArchive && e.drawerCount === 0);
    const archive = entries.find((e) => e.isArchive);

    let html = '';

    // Content group
    html += `<div class="wl-sep">Content · ${content.length} Active</div>`;
    html += `<nav class="wing-list">`;
    content.forEach((e) => {
      const active = e.apiKey === currentWingKey ? ' active' : '';
      const codePart = e.code ? esc(e.code.toLowerCase()) + ' · ' : '';
      const hotPart = e.drawerCount >= 10 ? ' · hot' : '';
      const sub = `${codePart}${e.roomCount} rooms${hotPart}`;
      html += `<a class="wl-item${active}" href="#${esc(e.dataId)}" data-wing-key="${esc(e.apiKey)}">`
        + `<span class="wl-name">${esc(e.displayName)}</span>`
        + `<span class="wl-meta">${e.drawerCount}</span>`
        + `<span class="wl-sub">${sub}</span>`
        + `</a>`;
    });
    html += `</nav>`;

    // Sparse group
    if (sparse.length) {
      html += `<div class="wl-sep">Sparse · ${sparse.length}</div>`;
      html += `<nav class="wing-list">`;
      sparse.forEach((e) => {
        const active = e.apiKey === currentWingKey ? ' active' : '';
        const loneRoom = e.rooms.length === 1 ? e.rooms[0].name : '';
        const subHtml = loneRoom ? `<span class="wl-sub">${esc(loneRoom)}</span>` : '';
        html += `<a class="wl-item${active}" href="#${esc(e.dataId)}" data-wing-key="${esc(e.apiKey)}">`
          + `<span class="wl-name sparse">${esc(e.displayName)}</span>`
          + `<span class="wl-meta">${e.drawerCount}</span>`
          + subHtml
          + `</a>`;
      });
      html += `</nav>`;
    }

    // Dormant group (0 drawers — architecture skeleton)
    if (dormant.length) {
      html += `<div class="wl-sep">Dormant · ${dormant.length}</div>`;
      html += `<nav class="wing-list">`;
      dormant.forEach((e) => {
        const active = e.apiKey === currentWingKey ? ' active' : '';
        const codePart = e.code ? esc(e.code.toLowerCase()) + ' \u00b7 ' : '';
        html += `<a class="wl-item${active}" href="#${esc(e.dataId)}" data-wing-key="${esc(e.apiKey)}" style="opacity:0.5">`
          + `<span class="wl-name sparse">${esc(e.displayName)}</span>`
          + `<span class="wl-meta">0</span>`
          + `<span class="wl-sub">${codePart}awaiting</span>`
          + `</a>`;
      });
      html += `</nav>`;
    }

    // Archive group
    if (archive) {
      const active = archive.apiKey === currentWingKey ? ' active' : '';
      html += `<div class="wl-sep">System · Archive</div>`;
      html += `<nav class="wing-list">`;
      html += `<a class="wl-item${active}" href="#${esc(archive.dataId)}" data-wing-key="${esc(archive.apiKey)}" style="border:1px dashed var(--border-mid)">`
        + `<span class="wl-name sparse">${esc(archive.displayName)}</span>`
        + `<span class="wl-meta">${archive.drawerCount}</span>`
        + `<span class="wl-sub">sys · archived</span>`
        + `</a>`;
      html += `</nav>`;
    }

    aside.innerHTML = html;
  }

  function updateActiveWingInSidebar(apiKey) {
    document.querySelectorAll('.wl-item').forEach((el) => {
      el.classList.toggle('active', el.dataset.wingKey === apiKey);
    });
  }

  // ---------- wing detail render ----------
  function formatLastFiled(isoString) {
    if (!isoString) return '';
    const t = new Date(isoString);
    if (isNaN(t.getTime())) return '';
    const mm = String(t.getMonth() + 1).padStart(2, '0');
    const dd = String(t.getDate()).padStart(2, '0');
    const now = new Date();
    const sameDay = t.getFullYear() === now.getFullYear()
      && t.getMonth() === now.getMonth()
      && t.getDate() === now.getDate();
    if (sameDay) {
      const rel = fmtRel(isoString);
      return rel ? `${mm}.${dd} · ${rel}` : `${mm}.${dd}`;
    }
    return `${mm}.${dd}`;
  }

  function renderWingDetailHtml(apiKey, drawers) {
    const dataId = apiWingIdToDataId(apiKey);
    const cfg = lookupWingConfig(dataId);
    const displayName = (cfg && cfg.name) || dataId;
    const jp = (cfg && cfg.jp) || '';
    const code = (cfg && cfg.code) || '';

    // group drawers by metadata.room
    const roomBuckets = new Map();
    drawers.forEach((d) => {
      const meta = d.metadata || {};
      const roomName = meta.room || '(unassigned)';
      if (!roomBuckets.has(roomName)) roomBuckets.set(roomName, []);
      roomBuckets.get(roomName).push(d);
    });

    // sort drawers inside each room by filed_at desc
    roomBuckets.forEach((list) => {
      list.sort((a, b) => {
        const ta = new Date((a.metadata && a.metadata.filed_at) || 0).getTime();
        const tb = new Date((b.metadata && b.metadata.filed_at) || 0).getTime();
        return (isFinite(tb) ? tb : 0) - (isFinite(ta) ? ta : 0);
      });
    });

    const rooms = Array.from(roomBuckets.entries()).map(([name, list]) => {
      let lastFiled = '';
      list.forEach((d) => {
        const f = (d.metadata && d.metadata.filed_at) || '';
        if (f && (!lastFiled || new Date(f).getTime() > new Date(lastFiled).getTime())) {
          lastFiled = f;
        }
      });
      return { name, drawers: list, count: list.length, lastFiled };
    });
    rooms.sort((a, b) => b.count - a.count);

    const drawerCount = drawers.length;
    const roomCount = rooms.length;
    const isHot = drawerCount >= 10;

    const jpLine = jp ? `${esc(jp)} · ${isHot ? 'hot' : 'active'}` : (isHot ? 'hot' : 'active');
    const codeSpan = code
      ? ` <span style="font-size:16px;color:var(--text-3);margin-left:10px;">${esc(code)}</span>`
      : '';

    let html = '';
    html += `<div class="wing-header">`
      + `<div>`
      + `<h2 class="wh-name">${esc(displayName)}${codeSpan}</h2>`
      + `<div class="wh-jp">${jpLine}</div>`
      + `</div>`
      + `<div class="wh-stats">`
      + `<div class="wh-stat"><div class="n">${roomCount}</div><span class="k">rooms</span></div>`
      + `<div class="wh-stat"><div class="n">${drawerCount}</div><span class="k">drawers</span></div>`
      + `<div class="wh-stat"><div class="n">—</div><span class="k">triples</span></div>`
      + `<div class="wh-stat"><div class="n">—</div><span class="k">tunnels</span></div>`
      + `</div>`
      + `</div>`;

    if (!rooms.length) {
      html += `<div style="padding:40px;color:var(--text-3);font-size:13px;">此翼暂无 drawer。</div>`;
      return html;
    }

    rooms.forEach((r) => {
      const lastShort = formatLastFiled(r.lastFiled);
      const tiles = r.drawers.map((d) => {
        const preview = d.content_preview || '';
        const full = d.content_full || preview;
        const title = truncate(preview, 40);
        const wordCount = String(full).length;
        return `<a class="d-tile" href="#" draggable="true" data-drawer-id="${esc(d.id)}">`
          + `<h4 class="d-title">${esc(title)}</h4>`
          + `<p class="d-excerpt">${esc(preview)}</p>`
          + `<div class="d-foot"><span>${wordCount} 字</span></div>`
          + `</a>`;
      }).join('');

      const lastLine = lastShort
        ? `<div><span class="n">Last</span> ${esc(lastShort)}</div>`
        : '';
      // data-room holds the raw metadata room name; empty string means the
      // "(unassigned)" bucket (can't be a cross-room drop target in this PR,
      // since dropping there would write literal "(unassigned)" into metadata).
      const roomAttr = r.name === '(unassigned)' ? '' : r.name;
      html += `<div class="room-row" data-room="${esc(roomAttr)}">`
        + `<div>`
        + `<div class="room-name">${esc(r.name)}</div>`
        + `<div class="room-stats">`
        + `<div><span class="n">${r.count}</span> drawers</div>`
        + lastLine
        + `</div>`
        + `</div>`
        + `<div class="drawer-grid">${tiles}</div>`
        + `</div>`;
    });

    return html;
  }

  async function loadWingDetail(apiKey, opts) {
    opts = opts || {};
    const preserveScroll = !!opts.preserveScroll;
    const token = ++loadToken;
    currentWingKey = apiKey;
    const section = document.querySelector('.wings-layout > section');
    if (!section) return;

    const savedScroll = preserveScroll ? window.scrollY : 0;
    if (!preserveScroll) {
      section.innerHTML = '<div style="padding:40px;color:var(--text-3);font-size:13px;">Loading wing…</div>';
    }

    try {
      let drawers = drawerCache.get(apiKey);
      if (!drawers) {
        drawers = await window.KaguyaAPI.getDrawers({ wing: apiKey, limit: 200 });
        if (token !== loadToken) return;
        drawerCache.set(apiKey, drawers);
      }
      if (token !== loadToken) return;
      section.innerHTML = renderWingDetailHtml(apiKey, drawers || []);
      updateActiveWingInSidebar(apiKey);
      if (preserveScroll) {
        requestAnimationFrame(() => window.scrollTo(0, savedScroll));
      }
    } catch (err) {
      if (token !== loadToken) return;
      console.error('loadWingDetail failed:', err);
      section.innerHTML = `<div style="padding:40px;color:var(--camellia-text);">加载失败: ${esc(err && err.message ? err.message : String(err))}</div>`;
    }
  }

  function invalidateWingsAndRefresh(editedWings) {
    const set = new Set((editedWings || []).filter(Boolean));
    set.forEach((w) => drawerCache.delete(w));
    if (currentWingKey && set.has(currentWingKey)) {
      return loadWingDetail(currentWingKey, { preserveScroll: true });
    }
    return Promise.resolve();
  }

  function pickInitialWing() {
    const hash = location.hash.replace(/^#/, '');
    const allWings = (window.KAGUYA && window.KAGUYA.wings) || [];
    if (hash) {
      const apiKey = dataIdToApiWingKey(hash);
      // accept if wing exists in data.js or API
      const inData = allWings.some((w) => w.id === hash);
      const map = wingsMap();
      if (inData || apiKey in map) return apiKey;
    }
    // default: first non-archive wing from data.js
    const first = allWings.find((w) => !w.archive);
    if (first) return dataIdToApiWingKey(first.id);
    const map = wingsMap();
    const keys = Object.keys(map);
    return keys.length ? keys[0] : null;
  }

  // ---------- drawer detail modal ----------
  function findDrawerById(id) {
    if (!id) return null;
    for (const [, list] of drawerCache) {
      if (!Array.isArray(list)) continue;
      const hit = list.find((d) => d && d.id === id);
      if (hit) return hit;
    }
    return null;
  }

  function openDrawerModal(drawer) {
    if (!drawer) return;
    const meta = drawer.metadata || {};
    const preview = drawer.content_preview || '';
    const fullInitial = drawer.content_full || preview;
    const title = truncate(preview, 40) || '(untitled drawer)';
    const subParts = [];
    if (meta.wing) subParts.push(meta.wing);
    if (meta.room) subParts.push(meta.room);
    const subtitle = subParts.join(' · ');

    // Captured at modal open; do not read currentWingKey after an awaited call.
    const originalWingKey = meta.wing || currentWingKey;
    // Flipped by onClose (any close path). Every async callback that touches
    // modal DOM or calls KaguyaModal.* must guard on this — otherwise a
    // late-arriving response could mutate a subsequently-opened modal.
    let modalActive = true;

    const snapshot = {
      content: fullInitial,
      wing: meta.wing || '',
      room: meta.room || '',
    };

    const editState = { content: snapshot.content, wing: snapshot.wing, room: snapshot.room, error: '', saving: false };

    function renderViewBody() {
      const metaRows = [
        ['ID', drawer.id || '—'],
        ['Wing', meta.wing || '—'],
        ['Room', meta.room || '—'],
        ['Filed', meta.filed_at || '—'],
        ['Chunk', (meta.chunk_index !== undefined && meta.chunk_index !== null) ? String(meta.chunk_index) : '—'],
        ['Added by', meta.added_by || '—'],
      ].map(([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('');
      return `
        <dl class="kg-modal-metagrid">${metaRows}</dl>
        <div class="kg-modal-fulltext">${esc(editState.content)}</div>
      `;
    }

    function enterViewState() {
      editState.error = '';
      window.KaguyaModal.update({
        body: renderViewBody(),
        actions: [
          { label: '删除', variant: 'danger', onClick: enterConfirmDeleteState },
          { label: '编辑', variant: 'primary', onClick: enterEditState },
        ],
      });
    }

    function renderEditBody() {
      const ddWings = (window.KAGUYA && window.KAGUYA.wings) || [];
      const wingOptions = ddWings.filter((w) => !w.archive).map((w) => {
        const key = dataIdToApiWingKey(w.id);
        const display = w.name || w.id;
        const sel = key === editState.wing ? ' selected' : '';
        return `<option value="${esc(key)}"${sel}>${esc(display)} (${esc(key)})</option>`;
      }).join('');

      const errBlock = editState.error
        ? `<div class="kg-modal-error">${esc(editState.error)}</div>`
        : '';

      return `
        <form class="kg-modal-form" data-drawer-edit-form onsubmit="return false;">
          <div class="kg-modal-field">
            <label for="drawer-edit-content">Content</label>
            <textarea id="drawer-edit-content" name="content">${esc(editState.content)}</textarea>
          </div>
          <div class="kg-modal-field">
            <label for="drawer-edit-wing">Wing</label>
            <select id="drawer-edit-wing" name="wing">${wingOptions}</select>
          </div>
          <div class="kg-modal-field">
            <label for="drawer-edit-room">Room</label>
            <input id="drawer-edit-room" name="room" type="text" value="${esc(editState.room)}" placeholder="自由文本,支持新建" />
          </div>
          ${errBlock}
        </form>
      `;
    }

    function wireEditInputs() {
      const form = document.querySelector('.kg-modal-body [data-drawer-edit-form]');
      if (!form) return;
      const contentEl = form.querySelector('#drawer-edit-content');
      const wingEl = form.querySelector('#drawer-edit-wing');
      const roomEl = form.querySelector('#drawer-edit-room');
      if (contentEl) contentEl.addEventListener('input', (e) => { editState.content = e.target.value; });
      if (wingEl) wingEl.addEventListener('change', (e) => { editState.wing = e.target.value; });
      if (roomEl) roomEl.addEventListener('input', (e) => { editState.room = e.target.value; });
    }

    function enterEditState() {
      editState.error = '';
      window.KaguyaModal.update({
        body: renderEditBody(),
        actions: [
          { label: '取消', variant: 'ghost', onClick: enterViewState },
          { label: '保存', variant: 'primary', onClick: handleSave },
        ],
      });
      wireEditInputs();
    }

    function enterConfirmDeleteState() {
      const bodyHtml = `
        <div class="kg-modal-confirm-text">
          确定要删除这个 drawer 吗？
          <span class="warn">操作不可逆,向量和元数据会一并从宫殿中消失。</span>
        </div>
      `;
      window.KaguyaModal.update({
        body: bodyHtml,
        actions: [
          { label: '取消', variant: 'ghost', onClick: enterViewState },
          { label: '确认删除', variant: 'danger', onClick: handleDelete },
        ],
      });
    }

    function buildPatch() {
      const patch = {};
      if (editState.content !== snapshot.content) patch.content = editState.content;
      if (editState.wing !== snapshot.wing) patch.wing = editState.wing;
      if (editState.room !== snapshot.room) patch.room = editState.room;
      return patch;
    }

    function showEditError(msg) {
      editState.error = msg || '操作失败';
      const bodyEl = document.querySelector('.kg-modal-body');
      if (!bodyEl) return;
      const existing = bodyEl.querySelector('.kg-modal-error');
      if (existing) existing.remove();
      const form = bodyEl.querySelector('.kg-modal-form');
      const err = document.createElement('div');
      err.className = 'kg-modal-error';
      err.textContent = editState.error;
      if (form) form.appendChild(err); else bodyEl.appendChild(err);
    }

    async function handleSave() {
      if (editState.saving || !modalActive) return;

      if (typeof editState.content !== 'string' || editState.content.trim() === '') {
        showEditError('Content 不能为空');
        return;
      }

      const patch = buildPatch();
      if (Object.keys(patch).length === 0) {
        showEditError('无改动');
        return;
      }

      editState.saving = true;
      try {
        const result = await window.KaguyaAPI.updateDrawer(drawer.id, patch);
        const success = !(result && result.success === false);
        if (success) {
          // Always invalidate the affected wings, even if the user closed the
          // originating modal mid-flight. Otherwise a cache stale to the real
          // state survives.
          const touched = [originalWingKey];
          if (patch.wing && patch.wing !== originalWingKey) touched.push(patch.wing);
          if (modalActive) window.KaguyaModal.close();
          await invalidateWingsAndRefresh(touched);
          return;
        }
        // success === false — show inline error only if originating modal
        // is still on screen. If user navigated away, swallow silently.
        if (modalActive) showEditError(result.error || '保存失败');
      } catch (err) {
        console.error('updateDrawer failed:', err);
        if (modalActive) showEditError((err && err.message) ? err.message : String(err));
      } finally {
        editState.saving = false;
      }
    }

    function showBodyError(msg) {
      if (!modalActive) return;
      const bodyEl = document.querySelector('.kg-modal-body');
      if (!bodyEl) return;
      const existing = bodyEl.querySelector('.kg-modal-error');
      if (existing) existing.remove();
      const err = document.createElement('div');
      err.className = 'kg-modal-error';
      err.textContent = msg;
      bodyEl.appendChild(err);
    }

    async function handleDelete() {
      if (!modalActive) return;
      try {
        const result = await window.KaguyaAPI.deleteDrawer(drawer.id);
        const success = !(result && result.success === false);
        if (success) {
          if (modalActive) window.KaguyaModal.close();
          await invalidateWingsAndRefresh([originalWingKey]);
          return;
        }
        showBodyError(result.error || '删除失败');
      } catch (err) {
        console.error('deleteDrawer failed:', err);
        showBodyError((err && err.message) ? err.message : String(err));
      }
    }

    window.KaguyaModal.open({
      title,
      subtitle,
      body: renderViewBody(),
      actions: [
        { label: '删除', variant: 'danger', onClick: enterConfirmDeleteState },
        { label: '编辑', variant: 'primary', onClick: enterEditState },
      ],
      onClose: () => { modalActive = false; },
    });
  }

  // ---------- drag-and-drop: move drawer across wings / across rooms ----------
  //
  // Cross-wing: grab .d-tile → drag over .wl-item → drop triggers move modal.
  // Cross-room (same wing): grab .d-tile → drag over .room-row → drop triggers
  // move modal with the target room pre-filled to the drop zone's room name.
  // Silent no-op when drop target is the source wing/room, the "(unassigned)"
  // bucket, or outside any valid zone — dragover only calls preventDefault
  // when the target is *different*, so the browser blocks invalid drops
  // naturally.
  let draggingDrawer = null; // { id, sourceWingKey, sourceRoom }

  function clearDropTargets() {
    document.querySelectorAll('.wl-item.drop-target, .room-row.drop-target').forEach((el) => {
      el.classList.remove('drop-target');
    });
  }

  function handleTileDragStart(e) {
    const tile = e.target && e.target.closest && e.target.closest('.d-tile');
    if (!tile) return;
    const id = tile.dataset.drawerId;
    const drawer = findDrawerById(id);
    if (!drawer) return;
    const meta = drawer.metadata || {};
    draggingDrawer = {
      id,
      sourceWingKey: meta.wing || currentWingKey,
      sourceRoom: meta.room || '',
    };
    if (e.dataTransfer) {
      try { e.dataTransfer.effectAllowed = 'move'; } catch (_) {}
      // Override the anchor's default href payload with our drawer id.
      try { e.dataTransfer.setData('text/plain', id); } catch (_) {}
    }
    tile.classList.add('dragging');
  }

  function handleTileDragEnd(e) {
    const tile = e.target && e.target.closest && e.target.closest('.d-tile');
    if (tile) tile.classList.remove('dragging');
    clearDropTargets();
    draggingDrawer = null;
  }

  function handleWlDragOver(e) {
    if (!draggingDrawer) return;
    const item = e.target && e.target.closest && e.target.closest('.wl-item');
    if (!item) return;
    const targetKey = item.dataset.wingKey;
    if (!targetKey || targetKey === draggingDrawer.sourceWingKey) return;
    e.preventDefault();
    if (e.dataTransfer) {
      try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
    }
    item.classList.add('drop-target');
  }

  function handleWlDragLeave(e) {
    const item = e.target && e.target.closest && e.target.closest('.wl-item');
    if (!item) return;
    const related = e.relatedTarget;
    if (related && item.contains(related)) return;
    item.classList.remove('drop-target');
  }

  function handleWlDrop(e) {
    if (!draggingDrawer) return;
    const item = e.target && e.target.closest && e.target.closest('.wl-item');
    if (!item) return;
    const targetKey = item.dataset.wingKey;
    item.classList.remove('drop-target');
    if (!targetKey || targetKey === draggingDrawer.sourceWingKey) return;
    e.preventDefault();
    const drawerId = draggingDrawer.id;
    const sourceKey = draggingDrawer.sourceWingKey;
    draggingDrawer = null;
    const drawer = findDrawerById(drawerId);
    if (!drawer) return;
    openMoveModal(drawer, sourceKey, targetKey);
  }

  // Room-level handlers (same-wing cross-room). Attached to the section
  // element; events from inner .d-tile and .drawer-grid bubble up and we
  // resolve the enclosing .room-row via closest().
  function handleRoomDragOver(e) {
    if (!draggingDrawer) return;
    const row = e.target && e.target.closest && e.target.closest('.room-row');
    if (!row) return;
    const targetRoom = row.dataset.room;
    // Empty targetRoom = "(unassigned)" bucket; skip as drop target.
    if (!targetRoom || targetRoom === draggingDrawer.sourceRoom) return;
    e.preventDefault();
    if (e.dataTransfer) {
      try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
    }
    // Only one room highlights at a time.
    document.querySelectorAll('.room-row.drop-target').forEach((el) => {
      if (el !== row) el.classList.remove('drop-target');
    });
    row.classList.add('drop-target');
  }

  function handleRoomDragLeave(e) {
    const row = e.target && e.target.closest && e.target.closest('.room-row');
    if (!row) return;
    const related = e.relatedTarget;
    if (related && row.contains(related)) return;
    row.classList.remove('drop-target');
  }

  function handleRoomDrop(e) {
    if (!draggingDrawer) return;
    const row = e.target && e.target.closest && e.target.closest('.room-row');
    if (!row) return;
    const targetRoom = row.dataset.room;
    row.classList.remove('drop-target');
    if (!targetRoom || targetRoom === draggingDrawer.sourceRoom) return;
    e.preventDefault();
    const drawerId = draggingDrawer.id;
    const sourceKey = draggingDrawer.sourceWingKey;
    draggingDrawer = null;
    const drawer = findDrawerById(drawerId);
    if (!drawer) return;
    // Same-wing move: targetWing === sourceWing, room is pre-filled from drop zone.
    openMoveModal(drawer, sourceKey, sourceKey, targetRoom);
  }

  async function refreshSidebarCounts() {
    try {
      const [w, t] = await Promise.all([
        window.KaguyaAPI.getWings().catch(() => ({})),
        window.KaguyaAPI.getTaxonomy().catch(() => ({})),
      ]);
      wingsData = w;
      taxonomyData = t;
      renderSidebar();
    } catch (err) {
      console.error('refresh sidebar counts failed:', err);
    }
  }

  // targetRoomHint: when provided (cross-room drop), pre-fills the room field
  // with the drop zone's room. When undefined (cross-wing drop), pre-fills
  // with the drawer's original room. User can always edit before confirming.
  function openMoveModal(drawer, sourceWingKey, targetWingKey, targetRoomHint) {
    const meta = drawer.metadata || {};
    const preview = drawer.content_preview || '';
    const title = truncate(preview, 40) || '(untitled drawer)';
    const modalSubtitle = drawer.id || '';

    const sourceDataId = apiWingIdToDataId(sourceWingKey);
    const sourceCfg = lookupWingConfig(sourceDataId);
    const sourceDisplay = (sourceCfg && sourceCfg.name) || sourceDataId;
    const originalRoom = meta.room || '';
    const sourceLabel = `${sourceDisplay} · ${sourceWingKey} / ${originalRoom || '(unassigned)'}`;

    const targetDataId = apiWingIdToDataId(targetWingKey);
    const targetCfg = lookupWingConfig(targetDataId);
    const targetDisplay = (targetCfg && targetCfg.name) || targetDataId;
    const targetLabel = `${targetDisplay} · ${targetWingKey}`;

    const preloadRoom = (targetRoomHint !== undefined) ? targetRoomHint : originalRoom;
    const state = { room: preloadRoom, error: '', saving: false };
    let modalActive = true;

    function renderBody() {
      const errBlock = state.error
        ? `<div class="kg-modal-error">${esc(state.error)}</div>`
        : '';
      return `
        <form class="kg-modal-form" data-drawer-move-form onsubmit="return false;">
          <div class="kg-modal-field">
            <label>原位置</label>
            <input type="text" value="${esc(sourceLabel)}" readonly />
          </div>
          <div class="kg-modal-field">
            <label>目标 wing</label>
            <input type="text" value="${esc(targetLabel)}" readonly />
          </div>
          <div class="kg-modal-field">
            <label for="drawer-move-room">目标 room</label>
            <input id="drawer-move-room" name="room" type="text" value="${esc(state.room)}" placeholder="自由文本,支持新建" />
          </div>
          ${errBlock}
        </form>
      `;
    }

    function wireInputs() {
      const roomEl = document.querySelector('.kg-modal-body #drawer-move-room');
      if (roomEl) roomEl.addEventListener('input', (e) => { state.room = e.target.value; });
    }

    function showError(msg) {
      state.error = msg || '操作失败';
      if (!modalActive) return;
      const bodyEl = document.querySelector('.kg-modal-body');
      if (!bodyEl) return;
      const existing = bodyEl.querySelector('.kg-modal-error');
      if (existing) existing.remove();
      const form = bodyEl.querySelector('.kg-modal-form');
      const err = document.createElement('div');
      err.className = 'kg-modal-error';
      err.textContent = state.error;
      if (form) form.appendChild(err); else bodyEl.appendChild(err);
    }

    async function handleConfirm() {
      if (state.saving || !modalActive) return;
      const room = state.room;
      state.saving = true;
      try {
        const result = await window.KaguyaAPI.updateDrawer(drawer.id, {
          wing: targetWingKey,
          room,
        });
        const success = !(result && result.success === false);
        if (success) {
          if (modalActive) window.KaguyaModal.close();
          await refreshSidebarCounts();
          await invalidateWingsAndRefresh([sourceWingKey, targetWingKey]);
          return;
        }
        if (modalActive) showError(result.error || '移动失败');
      } catch (err) {
        console.error('updateDrawer (move) failed:', err);
        if (modalActive) showError((err && err.message) ? err.message : String(err));
      } finally {
        state.saving = false;
      }
    }

    window.KaguyaModal.open({
      title: '移动 drawer',
      subtitle: modalSubtitle,
      body: renderBody(),
      actions: [
        { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
        { label: '确认移动', variant: 'primary', onClick: handleConfirm },
      ],
      onClose: () => { modalActive = false; },
    });
    wireInputs();
  }

  // ---------- init ----------
  document.addEventListener('DOMContentLoaded', async () => {
    // tile clicks → open drawer modal instead of navigating away
    const sectionEl = document.querySelector('.wings-layout > section');
    if (sectionEl) {
      sectionEl.addEventListener('click', (e) => {
        const tile = e.target.closest && e.target.closest('.d-tile');
        if (!tile) return;
        e.preventDefault();
        const id = tile.dataset.drawerId;
        const drawer = findDrawerById(id);
        if (drawer) openDrawerModal(drawer);
      });
      sectionEl.addEventListener('dragstart', handleTileDragStart);
      sectionEl.addEventListener('dragend', handleTileDragEnd);
      sectionEl.addEventListener('dragover', handleRoomDragOver);
      sectionEl.addEventListener('dragleave', handleRoomDragLeave);
      sectionEl.addEventListener('drop', handleRoomDrop);
    }

    const asideEl = document.querySelector('.wings-layout > aside');
    if (asideEl) {
      asideEl.addEventListener('dragover', handleWlDragOver);
      asideEl.addEventListener('dragleave', handleWlDragLeave);
      asideEl.addEventListener('drop', handleWlDrop);
    }

    // γ: graceful fallback — API failure should not block architecture display
    try {
      [wingsData, taxonomyData] = await Promise.all([
        window.KaguyaAPI.getWings().catch((e) => { console.warn('getWings failed (ok for empty palace):', e.message); return {}; }),
        window.KaguyaAPI.getTaxonomy().catch((e) => { console.warn('getTaxonomy failed:', e.message); return {}; }),
      ]);
    } catch (err) {
      console.warn('wings data fetch failed, rendering skeleton:', err);
      wingsData = {};
      taxonomyData = {};
    }
    renderSidebar();
    const initial = pickInitialWing();
    if (initial) {
      try {
        await loadWingDetail(initial);
      } catch (detailErr) {
        console.warn('loadWingDetail failed for', initial, detailErr);
        const section = document.querySelector('.wings-layout > section');
        if (section) section.innerHTML = '<div style="padding:40px;color:var(--text-3);">Palace 尚未初始化。Wing 架构已就绪，等待数据写入。</div>';
      }
    } else {
      const section = document.querySelector('.wings-layout > section');
      if (section) section.innerHTML = '<div style="padding:40px;color:var(--text-3);">暂无 wing 数据。</div>';
    }
  });

  window.addEventListener('hashchange', () => {
    const hash = location.hash.replace(/^#/, '');
    if (!hash) return;
    const apiKey = dataIdToApiWingKey(hash);
    const allWings = (window.KAGUYA && window.KAGUYA.wings) || [];
    const known = allWings.some((w) => w.id === hash);
    if (!known) { const map = wingsMap(); if (!(apiKey in map)) return; }
    if (apiKey === currentWingKey) return;
    loadWingDetail(apiKey);
  });
})();
</script>
</body>
</html>
