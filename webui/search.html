<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Kaguya Mempalace — Search</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/shell.css" />
<style>
  .search-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px; background: var(--card); border: 1px solid var(--border-strong); border-radius: 2px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .search-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--serif); font-size: 22px; color: var(--text); letter-spacing: 0.01em;
  }
  .search-input::placeholder { color: var(--text-3); font-style: italic; }
  .search-kbd { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.15em; border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; }
  .search-scope { font-family: var(--mono); font-size: 10px; color: var(--text-2); letter-spacing: 0.18em; text-transform: uppercase; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 2px;
    font-family: var(--mono); font-size: 10.5px; color: var(--text-2); letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    transition: border-color 320ms var(--ease), color 320ms var(--ease), background 320ms var(--ease);
  }
  .filter-chip .n { color: var(--text-3); font-size: 10px; }
  .filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-chip.on { color: var(--camellia-text); border-color: var(--camellia-dark); background: rgba(184,77,90,0.05); }
  .filter-chip.on .n { color: var(--camellia-text); }

  .group-head { display: flex; align-items: baseline; justify-content: space-between; margin: 28px 0 12px; }
  .group-head h3 { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.06em; margin: 0; }
  .group-head .c { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.2em; text-transform: uppercase; }

  .result {
    display: block; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border); border-radius: 2px;
    padding: 16px 20px; margin-bottom: 10px;
    transition: border-color 320ms var(--ease), background 320ms var(--ease), transform 120ms var(--ease);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
  }
  .result:hover { border-color: var(--border-strong); background: rgba(184,77,90,0.025); }
  .result:active { transform: translateY(0.5px) scale(0.995); }
  .result-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .result-kind { font-family: var(--mono); font-size: 9.5px; color: var(--camellia-text); letter-spacing: 0.24em; text-transform: uppercase; }
  .result-path { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; }
  .result-path .slash { opacity: 0.5; margin: 0 4px; }
  .result-score { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; }
  .result-title { font-size: 14.5px; font-weight: 500; color: var(--text); margin: 0 0 6px; line-height: 1.45; }
  .result-snippet { font-size: 12.5px; color: var(--text-2); line-height: 1.75; margin: 0; }
  .result-snippet mark { background: rgba(184,77,90,0.22); color: var(--text); padding: 0 1px; border-radius: 1px; }
  .result-foot { margin-top: 8px; display: flex; gap: 12px; font-family: var(--mono); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.14em; }

  .triple-result {
    font-family: var(--mono); font-size: 12px;
    color: var(--text); line-height: 1.8;
  }
  .triple-result .pred { color: var(--camellia-text); padding: 0 6px; }
  .triple-result .obj { color: var(--text-2); }
</style>
</head>
<body data-page="search" data-crumbs="Palace / Search">
<div class="app">
  <div id="app-shell"></div>
  <div id="main-content">
    <div class="content">

      <header class="page-head">
        <div>
          <div class="eyebrow">Search · 探</div>
          <h1 class="page-title">跨 wing / graph / diary<span class="em"> 找一个字、一条关系、一段沉默。</span></h1>
        </div>
      </header>

      <section>
        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="var(--text-2)" stroke-width="1.25"><circle cx="6" cy="6" r="3.6"/><path d="M8.8 8.8l3.4 3.4"/></svg>
          <input class="search-input" value="边界 trust" />
          <span class="search-scope">38 RESULTS · 0.08s</span>
          <span class="search-kbd">ESC</span>
        </div>
        <div class="filters"></div>

        <div class="search-results"></div>
      </section>
    </div>
  </div>
</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/api.js"></script>
<script>
(function () {
  'use strict';

  const esc = (s) => window.KaguyaAPI.escapeHtml(s);

  // API wing key (e.g. "wing_sex_and_body") → short name (e.g. "sex_body")
  function wingShortName(apiKey) {
    if (!apiKey) return '';
    if (apiKey === 'chats') return 'chats';
    const stripped = String(apiKey).replace(/^wing_/, '');
    if (stripped === 'sex_and_body') return 'sex_body';
    if (stripped === 'serious_reality') return 'reality';
    return stripped;
  }

  function escapeRegex(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function highlightTerms(text, query) {
    const escaped = esc(text);
    if (!query) return escaped;
    const terms = String(query).split(/\s+/).filter(Boolean).map(escapeRegex);
    if (!terms.length) return escaped;
    const pattern = new RegExp('(' + terms.join('|') + ')', 'gi');
    return escaped.replace(pattern, '<mark>$1</mark>');
  }

  function drawerSuffix(id) {
    const s = String(id || '');
    const idx = s.lastIndexOf('_');
    if (idx >= 0 && idx < s.length - 1) return s.slice(idx + 1);
    return s.slice(0, 12);
  }

  function formatDistance(d) {
    if (d === null || d === undefined || isNaN(Number(d))) return '';
    return Number(d).toFixed(2);
  }

  // ---------- DOM refs ----------
  const input = document.querySelector('.search-input');
  const scopeEl = document.querySelector('.search-scope');
  const filtersEl = document.querySelector('.filters');
  const resultsEl = document.querySelector('.search-results');

  function setScope(text, isError) {
    if (!scopeEl) return;
    if (isError) {
      scopeEl.innerHTML = `<span style="color:var(--camellia-text)">${esc(text)}</span>`;
    } else {
      scopeEl.textContent = text;
    }
  }

  function renderFilters(totalCount) {
    if (!filtersEl) return;
    filtersEl.innerHTML = `
      <span class="filter-chip on">ALL <span class="n">${totalCount}</span></span>
      <span class="filter-chip on">DRAWERS <span class="n">${totalCount}</span></span>
      <span class="filter-chip" style="opacity:0.4;cursor:not-allowed;">DIARY <span class="n">—</span></span>
      <span class="filter-chip" style="opacity:0.4;cursor:not-allowed;">TRIPLES <span class="n">—</span></span>
      <span class="filter-chip" style="opacity:0.4;cursor:not-allowed;">ENTITIES <span class="n">—</span></span>
      <span class="filter-chip" style="opacity:0.4;cursor:not-allowed;">TUNNELS <span class="n">—</span></span>
      <span class="filter-chip" style="margin-left:auto;cursor:default;">SORT · RELEVANCE ▾</span>
    `;
  }

  function renderEmpty() {
    setScope('');
    if (filtersEl) filtersEl.innerHTML = '';
    if (resultsEl) {
      resultsEl.innerHTML = `<div style="padding:40px;color:var(--text-3);font-size:13px;text-align:center;">输入查询词并按 Enter 开始搜索。</div>`;
    }
  }

  function renderResultItem(query, r) {
    const meta = r.metadata || {};
    const wingApi = meta.wing || '';
    const room = meta.room || '';
    const wing = wingShortName(wingApi);
    const roomSuffix = drawerSuffix(r.id);
    const score = formatDistance(r.distance);

    const preview = r.content_preview || '';
    const title = window.KaguyaAPI.truncate(preview, 40);
    const snippet = window.KaguyaAPI.truncate(preview, 200);

    const pathHtml = [wing, room, roomSuffix]
      .filter(Boolean)
      .map((s) => esc(s))
      .join('<span class="slash">/</span>');

    const wordCount = preview.length;

    return `
      <a class="result" href="#" data-drawer-id="${esc(r.id || '')}">
        <div class="result-head">
          <span class="result-kind">drawer</span>
          <span class="result-path">${pathHtml}</span>
          <span class="result-score">${esc(score)}</span>
        </div>
        <h3 class="result-title">${highlightTerms(title, query)}</h3>
        <p class="result-snippet">${highlightTerms(snippet, query)}</p>
        <div class="result-foot"><span>${wordCount} 字</span></div>
      </a>
    `;
  }

  function renderResults(query, results, elapsedMs) {
    const count = results.length;
    setScope(count === 0 ? 'NO RESULTS' : `${count} RESULTS · ${elapsedMs}ms`);
    renderFilters(count);
    if (!resultsEl) return;
    if (count === 0) {
      resultsEl.innerHTML = `<div style="padding:40px;color:var(--text-3);font-size:13px;text-align:center;">没有匹配 "<em>${esc(query)}</em>" 的结果。</div>`;
      return;
    }
    resultsEl.innerHTML = results.map((r) => renderResultItem(query, r)).join('');
  }

  function renderError(query, err) {
    if (!resultsEl) return;
    const msg = err && err.message ? err.message : String(err);
    resultsEl.innerHTML = `<div style="padding:40px;color:var(--camellia-text);font-size:13px;text-align:center;">搜索 "<em>${esc(query)}</em>" 失败: ${esc(msg)}</div>`;
  }

  // ---------- search trigger ----------
  let activeQueryId = 0;

  async function triggerSearch(q) {
    if (!q) {
      renderEmpty();
      return;
    }
    const myId = ++activeQueryId;
    setScope('SEARCHING…');
    const t0 = performance.now();
    try {
      const results = await window.KaguyaAPI.search(q, { topK: 30 });
      if (myId !== activeQueryId) return;
      const elapsed = Math.round(performance.now() - t0);
      const list = Array.isArray(results) ? results : [];
      renderResults(q, list, elapsed);
    } catch (err) {
      if (myId !== activeQueryId) return;
      console.error('search failed:', err);
      setScope('ERROR', true);
      if (filtersEl) filtersEl.innerHTML = '';
      renderError(q, err);
    }
  }

  // ---------- init ----------
  document.addEventListener('DOMContentLoaded', () => {
    if (!input) return;
    input.value = '';
    input.setAttribute('placeholder', '搜索 drawer, diary, triple, tunnel...');
    renderEmpty();

    let debounceTimer = null;

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(debounceTimer);
        triggerSearch(input.value.trim());
      } else if (e.key === 'Escape') {
        e.preventDefault();
        clearTimeout(debounceTimer);
        input.value = '';
        activeQueryId++;
        renderEmpty();
      }
    });

    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = input.value.trim();
      if (!q) {
        activeQueryId++;
        renderEmpty();
        return;
      }
      debounceTimer = setTimeout(() => triggerSearch(q), 400);
    });

    setTimeout(() => {
      try { input.focus(); } catch (_) { /* ignore */ }
    }, 50);
  });
})();
</script>
</body>
</html>
