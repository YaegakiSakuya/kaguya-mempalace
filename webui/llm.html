<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Kaguya Mempalace — LLM Config</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/shell.css" />
<style>
  .llm-layout { display: grid; grid-template-columns: 240px minmax(0, 1fr) 310px; gap: 20px; }

  .prov-list { display: flex; flex-direction: column; gap: 2px; }
  .prov-head { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--text-3); text-transform: uppercase; padding: 0 4px 10px; display:flex; justify-content:space-between; align-items:baseline; }
  .prov {
    display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center;
    padding: 12px 14px; cursor: pointer; border-radius: 2px;
    border: 1px solid transparent;
    text-decoration: none; color: inherit;
    transition: background 320ms var(--ease), border-color 320ms var(--ease);
  }
  .prov:hover { background: var(--hover); }
  .prov.active { background: var(--hover); border-color: var(--border-strong); }
  .prov-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .prov-dot.off { background: var(--text-3); }
  .prov-dot.warn { background: var(--camellia); }
  .prov-name { font-size: 13.5px; color: var(--text); }
  .prov-model { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; margin-top: 2px; }
  .prov-role { font-family: var(--mono); font-size: 9px; color: var(--camellia-text); letter-spacing: 0.2em; text-transform: uppercase; }

  .cfg { background: var(--card); border: 1px solid var(--border); border-radius: 2px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.025); min-width: 0; }
  .cfg-head { padding: 22px 26px 18px; border-bottom: 1px solid var(--border); display:flex; align-items:flex-end; justify-content:space-between; gap: 24px; }
  .cfg-name { font-size: 20px; color: var(--text); margin: 0 0 4px; letter-spacing: 0.02em; }
  .cfg-sub { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .cfg-badges { display: flex; gap: 8px; }

  .cfg-body { padding: 6px 26px 22px; }
  .cfg-row { display: grid; grid-template-columns: 180px 1fr; gap: 18px; padding: 16px 0; border-top: 1px solid var(--border); align-items: baseline; }
  .cfg-row:first-of-type { border-top: none; }
  .cfg-k { font-family: var(--mono); font-size: 10.5px; color: var(--text-2); letter-spacing: 0.18em; text-transform: uppercase; }
  .cfg-k .hint { display: block; color: var(--text-3); font-size: 9.5px; letter-spacing: 0.15em; margin-top: 3px; text-transform: none; }
  .cfg-v { font-size: 13.5px; color: var(--text); line-height: 1.7; }
  .cfg-v .mono { font-family: var(--mono); font-size: 12px; }

  .slider { position: relative; height: 24px; }
  .slider .track { position: absolute; left: 0; right: 0; top: 11px; height: 1px; background: var(--border-mid); }
  .slider .fill { position: absolute; left: 0; top: 11px; height: 1px; background: var(--camellia); }
  .slider .knob { position: absolute; top: 6px; width: 12px; height: 12px; border: 1px solid var(--camellia); background: var(--card); border-radius: 50%; }
  .slider-meta { display: flex; justify-content: space-between; margin-top: 4px; font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; }

  .role-matrix { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 6px; }
  .role-cell { border: 1px solid var(--border); padding: 10px 12px; border-radius: 2px; cursor: pointer; transition: border-color 320ms var(--ease); }
  .role-cell:hover { border-color: var(--border-strong); }
  .role-cell.on { border-color: var(--camellia-dark); background: rgba(184,77,90,0.04); }
  .role-cell .t { font-family: var(--mono); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.22em; text-transform: uppercase; }
  .role-cell.on .t { color: var(--camellia-text); }
  .role-cell .v { font-size: 12.5px; color: var(--text); margin-top: 4px; }

  .json-panel { background: var(--card); border: 1px solid var(--border); border-radius: 2px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.025); }
  .json-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:baseline; }
  .json-body {
    padding: 14px 18px;
    font-family: var(--mono); font-size: 11px; color: var(--text); line-height: 1.85;
    white-space: pre; overflow-x: auto;
    letter-spacing: 0.01em;
  }
  .json-body .k { color: var(--camellia-text); }
  .json-body .s { color: var(--text); }
  .json-body .n { color: var(--violet); }
  .json-body .c { color: var(--text-3); }
  .json-body .b { color: var(--success); }
  .json-body .p { color: var(--text-2); }

  .usage { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .usage-cell { border: 1px solid var(--border); padding: 12px 14px; border-radius: 2px; }
  .usage-cell .k { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.22em; text-transform: uppercase; }
  .usage-cell .n { font-family: var(--mono); font-size: 20px; color: var(--text); margin-top: 4px; letter-spacing: 0.02em; }
  .usage-cell .s { font-family: var(--mono); font-size: 10px; color: var(--text-2); margin-top: 4px; letter-spacing: 0.1em; }

  .secret-field { font-family: var(--mono); font-size: 12.5px; color: var(--text-2); letter-spacing: 0.1em; border: 1px solid var(--border); padding: 8px 12px; border-radius: 2px; background: rgba(20,20,24,0.55); display: flex; align-items: center; gap: 10px; min-width: 0; }
  .secret-field > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .secret-field .toggle { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--camellia-text); letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; }
</style>
</head>
<body data-page="llm" data-crumbs="Palace / LLM Config">
<div class="app">
  <div id="app-shell"></div>
  <div id="main-content">
    <div class="content">

      <header class="page-head" id="page-head"></header>

      <div class="llm-layout">
        <aside id="providers-aside"></aside>
        <section class="cfg" id="cfg-panel"></section>
        <aside id="right-aside"></aside>
      </div>
    </div>
  </div>
</div>
<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/api.js"></script>
<script src="assets/modal.js"></script>
<script>
(function () {
  'use strict';

  const esc = window.KaguyaAPI.escapeHtml;
  const fmtRel = window.KaguyaAPI.formatRelativeTime;
  const fmtCount = window.KaguyaAPI.formatCount;

  // ---------- state ----------
  let llmConfig = null;
  let selectedProviderId = null;

  // ---------- helpers ----------
  function shortDate(iso) {
    if (!iso) return '—';
    const s = String(iso);
    return s.length >= 10 ? s.slice(0, 10) : s;
  }

  function currentProvider() {
    const providers = (llmConfig && llmConfig.providers) || [];
    return providers.find(p => p.id === selectedProviderId) || providers[0] || null;
  }

  // ---------- page head ----------
  function renderPageHead() {
    const el = document.getElementById('page-head');
    if (!el) return;
    try {
      const providers = (llmConfig && llmConfig.providers) || [];
      const active = (llmConfig && llmConfig.active) || {};
      el.innerHTML = `
        <div>
          <div class="eyebrow">LLM Config · 言語模型設定</div>
          <h1 class="page-title">${providers.length} 个 provider,<span class="em">当前活跃 ${esc(active.provider_name || '—')}。</span></h1>
          <p class="page-sub">active 指向整个 kaguya-mempalace 当前使用的 provider + model。切换 active 需通过 mempalace 接口(本页只读展示)。</p>
        </div>
        <div class="page-head-right">
          <div class="big">${providers.length}</div>
          <div>PROVIDERS</div>
          <div class="accent">● ACTIVE · ${esc(active.model || '—')}</div>
        </div>
      `;
    } catch (err) {
      console.error('renderPageHead failed:', err);
    }
  }

  // ---------- left aside: providers + active binding ----------
  function renderProvidersAside() {
    const el = document.getElementById('providers-aside');
    if (!el) return;
    try {
      const providers = (llmConfig && llmConfig.providers) || [];
      const active = (llmConfig && llmConfig.active) || {};
      const activeId = active.provider_id || null;

      const itemsHtml = providers.map(p => {
        const isActive = p.id === activeId;
        const isSelected = p.id === selectedProviderId;
        return `
          <a class="prov${isSelected ? ' active' : ''}" href="#${esc(p.id)}" data-provider-id="${esc(p.id)}">
            <span class="prov-dot${isActive ? '' : ' warn'}"></span>
            <div>
              <div class="prov-name">${esc(p.name || '—')}</div>
              <div class="prov-model">${esc(p.last_model || '—')}</div>
            </div>
            <div class="prov-role">${isActive ? 'ACTIVE' : ''}</div>
          </a>
        `;
      }).join('');

      const bindingHtml = `
        <div class="prov">
          <span class="prov-dot"></span>
          <div>
            <div class="prov-name">${esc(active.provider_name || '—')}</div>
            <div class="prov-model">${esc(active.model || '—')}</div>
          </div>
          <div class="prov-role">live</div>
        </div>
        <div style="margin-top:6px;padding:0 2px;font-size:10.5px;color:var(--text-3);font-family:var(--mono);letter-spacing:0.04em;word-break:break-all;line-height:1.5;">
          ${esc(active.base_url || '')}
        </div>
      `;

      el.innerHTML = `
        <div class="prov-head">
          <span>Providers</span>
          <button class="btn ghost" id="btn-add-provider" data-action="add-provider" style="font-size:10.5px;padding:4px 12px;letter-spacing:0.14em;">+ 新增</button>
        </div>
        <div class="prov-list">${itemsHtml || '<div style="color:var(--text-3);font-size:12px;padding:12px 14px;">未配置 provider。</div>'}</div>

        <div class="prov-head" style="margin-top: 20px;">
          <span>Active Binding</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;">
          ${bindingHtml}
        </div>
      `;
    } catch (err) {
      console.error('renderProvidersAside failed:', err);
    }
  }

  // ---------- main cfg panel ----------
  function renderCfgPanel() {
    const el = document.getElementById('cfg-panel');
    if (!el) return;
    try {
      const p = currentProvider();
      if (!p) {
        el.innerHTML = '<div style="padding:30px;color:var(--text-3);">没有可展示的 provider。</div>';
        return;
      }
      const active = (llmConfig && llmConfig.active) || {};
      const isActive = p.id === active.provider_id;
      const models = p.available_models || [];
      const modelChipsHtml = models.length === 0
        ? '<span style="color:var(--text-3);font-size:12px;">未缓存。首次使用时自动刷新。</span>'
        : models.map(m => {
            const isLast = m === p.last_model;
            return `<span class="chip${isLast ? ' hot' : ''}" data-action="model-click" data-provider-id="${esc(p.id)}" data-model="${esc(m)}" style="cursor:pointer;">${esc(m)}</span>`;
          }).join('');

      const refreshedLabel = p.models_refreshed_at
        ? `${fmtRel(p.models_refreshed_at)} · ${p.models_refreshed_at}`
        : '—';

      el.innerHTML = `
        <div class="cfg-head">
          <div>
            <h2 class="cfg-name">${esc(p.name || '—')} <span style="font-size:14px;color:var(--text-3);margin-left:8px;font-family:var(--mono);">${isActive ? '· ACTIVE' : ''}</span></h2>
            <div class="cfg-sub">PROVIDER · id ${esc((p.id || '').slice(0, 8))}…</div>
          </div>
          <div class="cfg-badges">
            ${isActive ? '<span class="chip ok">● active</span>' : '<span class="chip">standby</span>'}
            <span class="chip">${models.length} models</span>
            <span class="chip">since ${esc(shortDate(p.created_at))}</span>
          </div>
        </div>

        <div class="cfg-actions" style="padding: 14px 26px 16px; border-bottom: 1px solid var(--border); display:flex; gap:8px;">
          <button class="btn" data-action="edit-info" data-provider-id="${esc(p.id)}">编辑信息</button>
          <button class="btn" data-action="rotate-key" data-provider-id="${esc(p.id)}">轮换 key</button>
          <button class="btn" data-action="refresh-models" data-provider-id="${esc(p.id)}">刷新模型列表</button>
          <button class="btn danger" data-action="delete-provider" data-provider-id="${esc(p.id)}" ${isActive ? 'disabled aria-disabled="true" title="请先切换 active 到其他 provider"' : ''}>删除 provider</button>
        </div>

        <div class="cfg-body">

          <div class="cfg-row">
            <div class="cfg-k">API Key <span class="hint">server-side, masked here</span></div>
            <div class="cfg-v">
              <span style="font-family:var(--mono);color:var(--text-2);">${esc(p.api_key || '***')}</span>
              <span style="margin-left:12px;color:var(--text-3);font-family:var(--mono);font-size:10px;letter-spacing:0.14em;">点 "轮换 key" 修改</span>
            </div>
          </div>

          <div class="cfg-row">
            <div class="cfg-k">Base URL</div>
            <div class="cfg-v">
              <span class="mono" style="color:var(--text-2);word-break:break-all;">${esc(p.base_url || '—')}</span>
            </div>
          </div>

          <div class="cfg-row">
            <div class="cfg-k">Last Model <span class="hint">most recent active model</span></div>
            <div class="cfg-v">
              <span class="chip hot">${esc(p.last_model || '—')}</span>
            </div>
          </div>

          <div class="cfg-row">
            <div class="cfg-k">Available Models <span class="hint">${models.length} cached</span></div>
            <div class="cfg-v" style="display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;padding-right:8px;">
              ${modelChipsHtml}
            </div>
          </div>

          <div class="cfg-row">
            <div class="cfg-k">Models Refreshed</div>
            <div class="cfg-v">
              <span class="mono" style="color:var(--text-2);">${esc(refreshedLabel)}</span>
            </div>
          </div>

          <div class="cfg-row">
            <div class="cfg-k">Created</div>
            <div class="cfg-v">
              <span class="mono" style="color:var(--text-2);">${esc(p.created_at || '—')}</span>
            </div>
          </div>

        </div>
      `;
    } catch (err) {
      console.error('renderCfgPanel failed:', err);
    }
  }

  // ---------- right aside: JSON + usage ----------
  function renderRightAsideShell() {
    const el = document.getElementById('right-aside');
    if (!el) return;
    el.innerHTML = `
      <div class="json-panel">
        <div class="json-head">
          <span class="kicker">Config · JSON Snapshot</span>
          <span class="kicker" id="copy-json" style="color:var(--camellia-text);cursor:pointer;">COPY</span>
        </div>
        <div class="json-body" id="json-snapshot"></div>
      </div>

      <div class="json-panel" style="margin-top:16px;">
        <div class="json-head">
          <span class="kicker">Recent Usage · Last 10</span>
          <span class="kicker" style="color:var(--text-3);">/api/usage</span>
        </div>
        <div id="usage-list" style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    `;
  }

  function renderJsonSnapshot(p) {
    const container = document.getElementById('json-snapshot');
    if (!container) return;
    try {
      if (!p) {
        container.innerHTML = '<span class="c">// no provider selected</span>';
        return;
      }
      const lines = [
        { comment: '// provider' },
        { key: 'id', val: `"${p.id || ''}"`, kind: 's' },
        { key: 'name', val: `"${p.name || ''}"`, kind: 's' },
        { key: 'base_url', val: `"${p.base_url || ''}"`, kind: 's' },
        { key: 'api_key', val: `"${p.api_key || ''}"`, kind: 's' },
        { key: 'last_model', val: `"${p.last_model || ''}"`, kind: 's' },
        { key: 'available_models', val: `[${(p.available_models || []).length}]`, kind: 'n' },
        { key: 'created_at', val: `"${p.created_at || ''}"`, kind: 's' },
        { key: 'models_refreshed_at', val: `"${p.models_refreshed_at || ''}"`, kind: 's' },
      ];
      const html = lines.map(l => {
        if (l.comment) return `<span class="c">${esc(l.comment)}</span>`;
        return `<span class="k">${esc(l.key)}</span> = <span class="${l.kind}">${esc(l.val)}</span>`;
      }).join('\n');
      container.innerHTML = html;
    } catch (err) {
      console.error('renderJsonSnapshot failed:', err);
    }
  }

  function bindCopyButton() {
    const btn = document.getElementById('copy-json');
    if (!btn) return;
    btn.addEventListener('click', () => {
      const p = currentProvider();
      if (!p) return;
      const snapshot = {
        id: p.id,
        name: p.name,
        base_url: p.base_url,
        api_key: p.api_key,
        last_model: p.last_model,
        available_models: p.available_models,
        created_at: p.created_at,
        models_refreshed_at: p.models_refreshed_at,
      };
      const text = JSON.stringify(snapshot, null, 2);
      const done = () => {
        const orig = btn.textContent;
        btn.textContent = 'COPIED';
        setTimeout(() => { btn.textContent = orig; }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(err => {
          console.error('clipboard write failed:', err);
        });
      }
    });
  }

  async function renderUsage() {
    const container = document.getElementById('usage-list');
    if (!container) return;
    try {
      const usage = await window.KaguyaAPI.getUsage();
      const list = Array.isArray(usage) ? usage : [];
      const recent = list.slice(-10).reverse();

      if (recent.length === 0) {
        container.innerHTML = '<div style="color:var(--text-3);font-size:12px;">暂无调用记录。</div>';
        return;
      }

      container.innerHTML = recent.map(u => `
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding-bottom:7px;border-bottom:1px solid var(--border);">
          <div style="display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;">
            <span class="mono" style="font-size:11.5px;color:var(--text);">${esc(u.model || '—')}</span>
            <span class="mono" style="font-size:10px;color:var(--text-3);letter-spacing:0.04em;">${esc(u.turn_type || '')} · ${esc(fmtRel(u.ts) || '')}</span>
          </div>
          <div class="mono" style="font-size:11px;color:var(--text-2);white-space:nowrap;">
            ${esc(fmtCount(u.prompt_tokens))} / ${esc(fmtCount(u.completion_tokens))}
          </div>
        </div>
      `).join('');
    } catch (err) {
      console.error('getUsage failed:', err);
      container.innerHTML = `<div style="color:var(--camellia-text);font-size:12px;">usage 加载失败</div>`;
    }
  }

  // ---------- shared: password field DOM builder ----------
  function buildPasswordField(name, placeholder) {
    const wrap = document.createElement('div');
    wrap.className = 'kg-password-field';
    const input = document.createElement('input');
    input.type = 'password';
    input.name = name;
    input.placeholder = placeholder || '';
    input.autocomplete = 'new-password';
    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'kg-pw-toggle';
    toggle.textContent = 'SHOW';
    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      if (input.type === 'password') { input.type = 'text'; toggle.textContent = 'HIDE'; }
      else { input.type = 'password'; toggle.textContent = 'SHOW'; }
    });
    wrap.appendChild(input);
    wrap.appendChild(toggle);
    return { wrap, input };
  }

  // ---------- after any write: reload config and rerender ----------
  async function reloadAndRender(newlySelectedId) {
    try {
      llmConfig = await window.KaguyaAPI.getLlmConfig();
      const providers = (llmConfig && llmConfig.providers) || [];
      const active = (llmConfig && llmConfig.active) || {};
      if (newlySelectedId && providers.some(p => p.id === newlySelectedId)) {
        selectedProviderId = newlySelectedId;
      } else if (!providers.some(p => p.id === selectedProviderId)) {
        selectedProviderId = active.provider_id || (providers[0] && providers[0].id) || null;
      }
      renderAll();
    } catch (err) {
      console.error('reload llm config failed:', err);
    }
  }

  // ---------- modal: add provider ----------
  function openAddProviderModal() {
    const form = document.createElement('form');
    form.className = 'kg-modal-form';
    form.addEventListener('submit', (e) => e.preventDefault());

    const nameField = document.createElement('div');
    nameField.className = 'kg-modal-field';
    nameField.innerHTML = '<label>Name</label><input name="name" type="text" placeholder="e.g. OpenRouter">';
    form.appendChild(nameField);

    const urlField = document.createElement('div');
    urlField.className = 'kg-modal-field';
    urlField.innerHTML = '<label>Base URL</label><input name="base_url" type="text" placeholder="https://openrouter.ai/api/v1">';
    form.appendChild(urlField);

    const keyFieldWrap = document.createElement('div');
    keyFieldWrap.className = 'kg-modal-field';
    const keyLabel = document.createElement('label');
    keyLabel.textContent = 'API Key';
    keyFieldWrap.appendChild(keyLabel);
    const { wrap: keyWrap, input: keyInput } = buildPasswordField('api_key', 'sk-...');
    keyFieldWrap.appendChild(keyWrap);
    form.appendChild(keyFieldWrap);

    const errBanner = document.createElement('div');
    form.appendChild(errBanner);

    const showErr = (msg) => { errBanner.innerHTML = `<div class="kg-modal-error">${esc(msg)}</div>`; };

    window.KaguyaModal.open({
      title: '新增 Provider',
      subtitle: 'ADD LLM PROVIDER',
      body: form,
      actions: [
        { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
        { label: '创建', variant: 'primary', onClick: async () => {
          const name = form.querySelector('[name=name]').value.trim();
          const base_url = form.querySelector('[name=base_url]').value.trim();
          const api_key = keyInput.value.trim();
          if (!name || !base_url || !api_key) { showErr('三个字段都是必填'); return; }
          try {
            const res = await window.KaguyaAPI.addLlmProvider({ name, base_url, api_key });
            window.KaguyaModal.close();
            await reloadAndRender(res && res.provider && res.provider.id);
          } catch (err) {
            showErr(err && err.message ? err.message : String(err));
          }
        }},
      ],
    });
  }

  // ---------- modal: edit info (name + base_url only) ----------
  function openEditInfoModal(provider) {
    const form = document.createElement('form');
    form.className = 'kg-modal-form';
    form.addEventListener('submit', (e) => e.preventDefault());
    form.innerHTML = `
      <div class="kg-modal-field">
        <label>Name</label>
        <input name="name" type="text" value="${esc(provider.name || '')}">
      </div>
      <div class="kg-modal-field">
        <label>Base URL</label>
        <input name="base_url" type="text" value="${esc(provider.base_url || '')}">
      </div>
    `;
    const errBanner = document.createElement('div');
    form.appendChild(errBanner);
    const showErr = (msg) => { errBanner.innerHTML = `<div class="kg-modal-error">${esc(msg)}</div>`; };

    window.KaguyaModal.open({
      title: `编辑 · ${provider.name}`,
      subtitle: 'EDIT PROVIDER INFO',
      body: form,
      actions: [
        { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
        { label: '保存', variant: 'primary', onClick: async () => {
          const name = form.querySelector('[name=name]').value.trim();
          const base_url = form.querySelector('[name=base_url]').value.trim();
          const patch = {};
          if (name !== (provider.name || '')) patch.name = name;
          if (base_url !== (provider.base_url || '')) patch.base_url = base_url;
          if (Object.keys(patch).length === 0) {
            window.KaguyaModal.close();
            return;
          }
          try {
            await window.KaguyaAPI.updateLlmProvider(provider.id, patch);
            window.KaguyaModal.close();
            await reloadAndRender(provider.id);
          } catch (err) {
            showErr(err && err.message ? err.message : String(err));
          }
        }},
      ],
    });
  }

  // ---------- modal: rotate api_key ----------
  function openRotateKeyModal(provider) {
    const form = document.createElement('form');
    form.className = 'kg-modal-form';
    form.addEventListener('submit', (e) => e.preventDefault());

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:12px;color:var(--text-3);line-height:1.7;margin-bottom:6px;';
    hint.innerHTML = `为 <span style="color:var(--text);">${esc(provider.name)}</span> 设置新的 API key。旧 key 立即失效。`;
    form.appendChild(hint);

    const keyField = document.createElement('div');
    keyField.className = 'kg-modal-field';
    keyField.innerHTML = '<label>New API Key</label>';
    const { wrap: keyWrap, input: keyInput } = buildPasswordField('api_key', 'sk-...');
    keyField.appendChild(keyWrap);
    form.appendChild(keyField);

    const errBanner = document.createElement('div');
    form.appendChild(errBanner);
    const showErr = (msg) => { errBanner.innerHTML = `<div class="kg-modal-error">${esc(msg)}</div>`; };

    window.KaguyaModal.open({
      title: `轮换 Key · ${provider.name}`,
      subtitle: 'ROTATE API KEY',
      body: form,
      actions: [
        { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
        { label: '轮换', variant: 'danger', onClick: async () => {
          const api_key = keyInput.value.trim();
          if (!api_key) { showErr('请输入新 key'); return; }
          try {
            await window.KaguyaAPI.updateLlmProvider(provider.id, { api_key });
            window.KaguyaModal.close();
            await reloadAndRender(provider.id);
          } catch (err) {
            showErr(err && err.message ? err.message : String(err));
          }
        }},
      ],
    });
  }

  // ---------- modal: confirm delete provider ----------
  function openConfirmDeleteModal(provider) {
    const body = document.createElement('div');
    body.innerHTML = `
      <div class="kg-modal-confirm-text">
        确定要删除 <span style="color:var(--text);">${esc(provider.name)}</span> 吗?
        <span class="warn">操作不可逆, provider 和相关配置立即从运行时消失。</span>
      </div>
    `;
    const errBanner = document.createElement('div');
    body.appendChild(errBanner);
    const showErr = (msg) => { errBanner.innerHTML = `<div class="kg-modal-error">${esc(msg)}</div>`; };

    window.KaguyaModal.open({
      title: '删除 Provider',
      subtitle: 'CONFIRM DELETE',
      body: body,
      actions: [
        { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
        { label: '确认删除', variant: 'danger', onClick: async () => {
          try {
            await window.KaguyaAPI.deleteLlmProvider(provider.id);
            window.KaguyaModal.close();
            await reloadAndRender(null);
          } catch (err) {
            showErr(err && err.message ? err.message : String(err));
          }
        }},
      ],
    });
  }

  // ---------- action: refresh models ----------
  async function handleRefreshModels(providerId) {
    const p = (llmConfig.providers || []).find(x => x.id === providerId);
    if (!p) return;
    const btn = document.querySelector(`[data-action="refresh-models"][data-provider-id="${providerId}"]`);
    const originalText = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = '刷新中…'; }
    try {
      await window.KaguyaAPI.refreshLlmModels(providerId);
      await reloadAndRender(providerId);
    } catch (err) {
      console.error('refresh models failed:', err);
      alert('刷新模型列表失败: ' + (err && err.message ? err.message : String(err)));
      if (btn) { btn.disabled = false; btn.textContent = originalText; }
    }
  }

  // ---------- model chip click: toggle action tray ----------
  function handleModelClick(providerId, model, chipEl) {
    // If the clicked chip already has a tray right after it with the same model,
    // treat the click as "collapse" and stop here.
    const nextSib = chipEl.nextElementSibling;
    const alreadyOpen = nextSib
      && nextSib.classList.contains('kg-action-tray')
      && nextSib.dataset.ownerProvider === providerId
      && nextSib.dataset.ownerModel === model;

    // Always close any existing tray(s) belonging to this provider first.
    document.querySelectorAll('.kg-action-tray[data-owner-provider]').forEach(t => {
      if (t.dataset.ownerProvider === providerId) t.remove();
    });

    if (alreadyOpen) return;

    const tray = document.createElement('div');
    tray.className = 'kg-action-tray';
    tray.dataset.ownerProvider = providerId;
    tray.dataset.ownerModel = model;
    tray.innerHTML = `
      <button data-action="ping-model">Ping 测试</button>
      <button class="primary" data-action="set-active">Set as Active</button>
      <span class="kg-ping-status" style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:0.12em;"></span>
    `;
    chipEl.insertAdjacentElement('afterend', tray);

    tray.querySelector('[data-action=ping-model]').addEventListener('click', async (e) => {
      e.preventDefault();
      const statusEl = tray.querySelector('.kg-ping-status');
      statusEl.textContent = 'pinging…';
      statusEl.className = 'kg-ping-status';
      try {
        const r = await window.KaguyaAPI.pingLlmProvider(providerId, model);
        if (r && r.ok) {
          const lat = (typeof r.latency_ms !== 'undefined') ? `${r.latency_ms}ms` : '';
          statusEl.innerHTML = `<span class="kg-ping-result ok">● ok${lat ? ' · ' + esc(lat) : ''}</span>`;
          tray.dataset.pinged = 'ok';
        } else {
          const errMsg = (r && r.error) ? String(r.error) : 'unknown';
          statusEl.innerHTML = `<span class="kg-ping-result fail">● fail · ${esc(errMsg.slice(0, 40))}</span>`;
          tray.dataset.pinged = 'fail';
        }
      } catch (err) {
        const m = err && err.message ? err.message : String(err);
        statusEl.innerHTML = `<span class="kg-ping-result fail">● error · ${esc(m.slice(0, 40))}</span>`;
        tray.dataset.pinged = 'fail';
      }
    });

    tray.querySelector('[data-action=set-active]').addEventListener('click', (e) => {
      e.preventDefault();
      const pinged = tray.dataset.pinged;
      openSetActiveModal(providerId, model, pinged === 'ok');
    });
  }

  // ---------- modal: set active with ping 护栏 ----------
  function openSetActiveModal(providerId, model, pingedOk) {
    const p = (llmConfig.providers || []).find(x => x.id === providerId);
    if (!p) return;

    // showErr queries the live modal for a fresh error slot — survives KaguyaModal.update()
    // which swaps the body DOM and would otherwise detach any captured errBanner reference.
    const showErr = (msg) => {
      const slot = document.querySelector('.kg-modal-card .kg-modal-body .kg-modal-error-slot');
      if (slot) slot.innerHTML = `<div class="kg-modal-error">${esc(msg)}</div>`;
    };

    const doSwitch = async () => {
      try {
        await window.KaguyaAPI.setLlmActive({ provider_id: providerId, model });
        window.KaguyaModal.close();
        await reloadAndRender(providerId);
      } catch (err) {
        showErr(err && err.message ? err.message : String(err));
      }
    };

    const stage1Body = document.createElement('div');
    const pingStatus = pingedOk
      ? '<div style="color:var(--success);font-size:12px;margin-top:8px;">● 已 ping 通过, 可以安全切换</div>'
      : '<div style="color:var(--camellia-text);font-size:12px;margin-top:8px;">⚠ 未经 ping 测试, 建议先 ping 再切换</div>';
    stage1Body.innerHTML = `
      <div class="kg-modal-confirm-text">
        切换 active 到 <span style="color:var(--text);">${esc(p.name)} · ${esc(model)}</span>?
        <span class="warn">kaguya-mempalace 下一次 LLM 调用会立即使用新配置。</span>
        ${pingStatus}
      </div>
      <div class="kg-modal-error-slot"></div>
    `;

    const actions = pingedOk
      ? [
          { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
          { label: '确认切换', variant: 'primary', onClick: doSwitch },
        ]
      : [
          { label: '取消', variant: 'ghost', onClick: () => window.KaguyaModal.close() },
          { label: '强制切换', variant: 'danger', onClick: () => {
            const stage2Body = document.createElement('div');
            stage2Body.innerHTML = `
              <div class="kg-modal-confirm-text">未经 ping 测试, 确定继续?<span class="warn">若 provider/model 配置错误, gateway 会在下次调用时报错直到你切回正确配置。</span></div>
              <div class="kg-modal-error-slot"></div>
            `;
            window.KaguyaModal.update({
              body: stage2Body,
              actions: [
                { label: '返回', variant: 'ghost', onClick: () => openSetActiveModal(providerId, model, false) },
                { label: '我确定, 切换', variant: 'danger', onClick: doSwitch },
              ],
            });
          }},
        ];

    window.KaguyaModal.open({
      title: '切换 Active',
      subtitle: 'SET ACTIVE PROVIDER · MODEL',
      body: stage1Body,
      actions: actions,
    });
  }

  // ---------- orchestration ----------
  function renderAll() {
    renderPageHead();
    renderProvidersAside();
    renderCfgPanel();
    renderJsonSnapshot(currentProvider());
  }

  // click delegation on provider rows and all data-action triggers
  document.addEventListener('click', (e) => {
    // Provider-row selection: only when the click is NOT on an action trigger
    const prov = e.target.closest('.prov[data-provider-id]');
    if (prov && !e.target.closest('[data-action]')) {
      e.preventDefault();
      const id = prov.dataset.providerId;
      if (id && id !== selectedProviderId) {
        selectedProviderId = id;
        renderAll();
      }
      return;
    }

    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    if (actionEl.disabled) return;
    e.preventDefault();
    const action = actionEl.dataset.action;

    if (action === 'add-provider') {
      openAddProviderModal();
      return;
    }

    const providerId = actionEl.dataset.providerId;
    const provider = (llmConfig && llmConfig.providers || []).find(x => x.id === providerId);
    if (!provider) return;

    switch (action) {
      case 'edit-info':      openEditInfoModal(provider); break;
      case 'rotate-key':     openRotateKeyModal(provider); break;
      case 'delete-provider': {
        const activeId = llmConfig && llmConfig.active && llmConfig.active.provider_id;
        if (provider.id === activeId) return; // disabled, no-op
        openConfirmDeleteModal(provider);
        break;
      }
      case 'refresh-models': handleRefreshModels(providerId); break;
      case 'model-click':    handleModelClick(providerId, actionEl.dataset.model, actionEl); break;
    }
  });

  document.addEventListener('DOMContentLoaded', async () => {
    renderRightAsideShell();
    bindCopyButton();
    try {
      llmConfig = await window.KaguyaAPI.getLlmConfig();
      const providers = (llmConfig && llmConfig.providers) || [];
      const active = (llmConfig && llmConfig.active) || {};
      selectedProviderId = active.provider_id || (providers[0] && providers[0].id) || null;
      renderAll();
    } catch (err) {
      console.error('llm page init failed:', err);
      const content = document.querySelector('.content');
      if (content) {
        content.innerHTML = `<div style="padding:40px;color:var(--camellia-text);">LLM config 加载失败: ${esc(err && err.message ? err.message : String(err))}</div>`;
      }
      return;
    }
    renderUsage();
  });
})();
</script>
</body>
</html>
