server {
    server_name api.onlykaguya.com;

    location = /miniapp {
        return 302 /miniapp/;
    }

    location /miniapp/ {
        alias /home/ubuntu/apps/kaguya-mempalace/miniapp/dist/;
        index index.html;
        try_files $uri $uri/ /miniapp/index.html;
    }

    location /miniapp/stream {
        proxy_pass http://127.0.0.1:8765/miniapp/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    location /miniapp/history {
        proxy_pass http://127.0.0.1:8765/miniapp/history;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
    }

    location /miniapp/palace/ {
        proxy_pass http://127.0.0.1:8765/miniapp/palace/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
    }

    location /miniapp/config/ {
        proxy_pass http://127.0.0.1:8765/miniapp/config/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
    }
    location /.well-known/oauth-protected-resource {
        return 404;
    }
    location /.well-known/oauth-authorization-server {
        return 404;
    }
    location /mcp {
        allow 160.79.104.0/21;
        deny all;

        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /exec/ {
        allow 160.79.104.0/21;
        deny all;
        access_log off;
        proxy_pass http://127.0.0.1:3456/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location = /palace {
        return 302 /palace/;
    }

    location /palace/ {
        alias /home/ubuntu/apps/kaguya-mempalace/webui/;
        index index.html;
        try_files $uri $uri/ /palace/index.html;
    }

    location / {
        return 404;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.onlykaguya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.onlykaguya.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.onlykaguya.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name api.onlykaguya.com;
    return 404;
}
