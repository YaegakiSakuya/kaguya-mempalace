# Kaguya MemPalace MCP Server — add inside the server { } block
#
# FastMCP default endpoint is /mcp.  Using prefix "location /mcp" (no
# trailing slash) so nginx matches both /mcp and /mcp/* requests.
# proxy_pass without trailing / preserves the URI as-is to upstream.

location /mcp {
    # IP whitelist: Anthropic egress range
    allow 160.79.104.0/21;
    deny all;

    # Reverse proxy to MCP server
    proxy_pass http://127.0.0.1:8766;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streamable HTTP may use SSE streaming — disable buffering
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
